name: CI Build (script/run style)

on:
  workflow_dispatch:
    inputs:
      linux:
        description: Linux x86_64
        type: boolean
        default: true
      macos:
        description: macOS arm64
        type: boolean
        default: false
      windows:
        description: Windows x64
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    name: Build Linux
    if: ${{ fromJSON(inputs.linux) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          install_release_deps: true

      - name: Free up disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/share/swift || true
          df -h /

      - name: Install extra dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev
        shell: bash

      - name: Build
        run: |
          cargo build -p warp \
            --features "gui,release_bundle" \
            --bin zap-oss
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-linux
          path: target/debug/zap-oss
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS
    if: ${{ fromJSON(inputs.macos) }}
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add aarch64-apple-darwin
        shell: bash

      - name: Build
        run: |
          cargo build -p warp \
            --features "gui,release_bundle" \
            --bin zap-oss
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-macos
          path: target/debug/zap-oss
          if-no-files-found: error
          retention-days: 7

  build_windows:
    name: Build Windows
    if: ${{ fromJSON(inputs.windows) }}
    runs-on: self-host-windows
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Setup git for long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Set Rust home
        shell: pwsh
        run: echo "CARGO_HOME=C:\cargo" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set up Strawberry Perl for OpenSSL
        shell: pwsh
        run: |
          "C:/Strawberry/perl/bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install protoc
        shell: pwsh
        run: |
          $protocVersion = '25.1'
          $protocDir = "$env:RUNNER_TEMP\protoc"
          $protocExe = "$protocDir\bin\protoc.exe"
          $protocZip = "$env:RUNNER_TEMP\protoc-$protocVersion-win64.zip"
          if (-not (Test-Path $protocExe)) {
            Invoke-WebRequest -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$protocVersion/protoc-$protocVersion-win64.zip" -OutFile $protocZip
            Expand-Archive -Path $protocZip -DestinationPath $protocDir -Force
            Remove-Item $protocZip
          }
          "PROTOC=$protocExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$protocDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build
        run: |
          cargo build -p warp `
            --features "gui,release_bundle" `
            --bin zap-oss
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: List target/debug/ DLLs
        shell: pwsh
        run: |
          Write-Host "=== target/debug/ ==="
          Get-ChildItem target/debug/ -Name -Include *.dll,*.exe
          if (Test-Path target/debug/) {
            $dlls = Get-ChildItem target/debug/*.dll
            Write-Host "DLL count: $($dlls.Count)"
            $dlls | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes" }
          }
          if (Test-Path target/debug/x64/) {
            Write-Host "=== target/debug/x64/ ==="
            Get-ChildItem target/debug/x64/ -Name
          }

      - name: Stage binary with DLLs
        shell: pwsh
        run: |
          mkdir staging -Force
          copy target/debug/zap-oss.exe staging/
          if (Test-Path target/debug/conpty.dll) { copy target/debug/conpty.dll staging/ }
          if (Test-Path target/debug/dxcompiler.dll) { copy target/debug/dxcompiler.dll staging/ }
          if (Test-Path target/debug/dxil.dll) { copy target/debug/dxil.dll staging/ }
          if (Test-Path target/debug/msvcp140.dll) { copy target/debug/msvcp140.dll staging/ }
          if (Test-Path target/debug/vcruntime140.dll) { copy target/debug/vcruntime140.dll staging/ }
          if (Test-Path target/debug/vcruntime140_1.dll) { copy target/debug/vcruntime140_1.dll staging/ }
          if (Test-Path target/debug/OpenConsole.exe) {
            copy target/debug/OpenConsole.exe staging/
          } elseif (Test-Path target/debug/x64/OpenConsole.exe) {
            mkdir staging/x64 -Force
            copy target/debug/x64/OpenConsole.exe staging/x64/
          }
          if (-not (Test-Path staging/conpty.dll)) {
            throw "conpty.dll missing from staging"
          }
          Write-Host "Staging complete:"
          Get-ChildItem staging/ -Recurse -Name

      - name: Upload staged directory
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-windows
          path: staging/
          if-no-files-found: error
          retention-days: 7
