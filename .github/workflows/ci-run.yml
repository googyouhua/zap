name: CI Build (script/run style)

on:
  workflow_dispatch:
    inputs:
      linux:
        description: Linux x86_64
        type: boolean
        default: true
      macos:
        description: macOS arm64
        type: boolean
        default: false
      windows:
        description: Windows x64
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    name: Build Linux
    if: ${{ fromJSON(inputs.linux) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          install_release_deps: true

      - name: Free up disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/share/swift || true
          df -h /

      - name: Install extra dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev
        shell: bash

      - name: Build
        run: |
          cargo build -p warp \
            --profile release \
            --features "gui" \
            --bin zap-oss
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-linux
          path: target/release/zap-oss
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS
    if: ${{ fromJSON(inputs.macos) }}
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add aarch64-apple-darwin
        shell: bash

      - name: Build
        run: |
          cargo build -p warp \
            --profile release \
            --features "gui" \
            --bin zap-oss
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-macos
          path: target/release/zap-oss
          if-no-files-found: error
          retention-days: 7

  build_windows:
    name: Build Windows
    if: ${{ fromJSON(inputs.windows) }}
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          install_release_deps: true

      - name: Build
        run: |
          cargo build -p warp `
            --profile release `
            --features "gui" `
            --bin zap-oss
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-windows
          path: target/release/zap-oss.exe
          if-no-files-found: error
          retention-days: 7
