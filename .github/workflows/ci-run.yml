name: CI Build (script/run style)

on:
  workflow_dispatch:
    inputs:
      linux:
        description: Linux x86_64
        type: boolean
        default: true
      macos:
        description: macOS arm64
        type: boolean
        default: false
      windows:
        description: Windows x64
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    name: Build Linux
    if: ${{ fromJSON(inputs.linux) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          install_release_deps: true

      - name: Free up disk space
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/share/swift || true
          df -h /

      - name: Install extra dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev
        shell: bash

      - name: Build
        run: |
          cargo build -p warp \
            --profile release \
            --features "gui" \
            --bin zap-oss
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-linux
          path: target/release/zap-oss
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS
    if: ${{ fromJSON(inputs.macos) }}
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: macos
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add aarch64-apple-darwin
        shell: bash

      - name: Build
        run: |
          cargo build -p warp \
            --profile release \
            --features "gui" \
            --bin zap-oss
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-macos
          path: target/release/zap-oss
          if-no-files-found: error
          retention-days: 7

  build_windows:
    name: Build Windows
    if: ${{ fromJSON(inputs.windows) }}
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          install_release_deps: true

      - name: Build
        run: |
          cargo build -p warp `
            --profile release `
            --features "gui" `
            --bin zap-oss
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: List target/release/ DLLs
        shell: pwsh
        run: |
          Write-Host "=== target/release/ ==="
          Get-ChildItem target/release/ -Name -Include *.dll,*.exe
          if (Test-Path target/release/) {
            $dlls = Get-ChildItem target/release/*.dll
            Write-Host "DLL count: $($dlls.Count)"
            $dlls | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes" }
          }
          if (Test-Path target/release/x64/) {
            Write-Host "=== target/release/x64/ ==="
            Get-ChildItem target/release/x64/ -Name
          }

      - name: Stage binary with DLLs
        shell: pwsh
        run: |
          mkdir staging -Force
          copy target/release/zap-oss.exe staging/
          # Copy all DLLs from target/release/
          if (Test-Path target/release/conpty.dll) { copy target/release/conpty.dll staging/ }
          if (Test-Path target/release/dxcompiler.dll) { copy target/release/dxcompiler.dll staging/ }
          if (Test-Path target/release/dxil.dll) { copy target/release/dxil.dll staging/ }
          if (Test-Path target/release/msvcp140.dll) { copy target/release/msvcp140.dll staging/ }
          if (Test-Path target/release/vcruntime140.dll) { copy target/release/vcruntime140.dll staging/ }
          if (Test-Path target/release/vcruntime140_1.dll) { copy target/release/vcruntime140_1.dll staging/ }
          if (Test-Path target/release/OpenConsole.exe) {
            copy target/release/OpenConsole.exe staging/
          } elseif (Test-Path target/release/x64/OpenConsole.exe) {
            mkdir staging/x64 -Force
            copy target/release/x64/OpenConsole.exe staging/x64/
          }
          # Verify
          if (-not (Test-Path staging/conpty.dll)) {
            throw "conpty.dll missing from staging"
          }
          Write-Host "Staging complete:"
          Get-ChildItem staging/ -Recurse -Name

      - name: Upload staged directory
        uses: actions/upload-artifact@v4
        with:
          name: zap-oss-windows
          path: staging/
          if-no-files-found: error
          retention-days: 7
